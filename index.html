<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Kadir Saliu</title>
    <link rel="stylesheet" href="style.css" />

  <body>
    <div class="content">

            <div class="social-media-icon">

              <a href=""

          <div class="hero-title">
            <h1>Kadir Saliu</h1>

          </div>

          <div class="hero-arrow-down">

          </div>

    <nav class="nav">
      <img src="./assets/img/icons/logo-nav.png" alt="Logo" />

      <div class="nav-links">
        <a href="#why-me" class="nav-link">Why me</a>

      <div class="nav-lang">
        <a href="#" class="nav-lang-option">DE</a>
